// ═══════════════════════════════════════════════════════════
// PERF 1 — Virtual Scroll Engine
// ═══════════════════════════════════════════════════════════
function initVirtualScroll() {
  const viewport = document.getElementById('masterWrap');
  if (!viewport || VS.totalRows === 0) return;

  VS.viewport   = viewport;
  VS.tbodyEl    = document.getElementById('vsTbody');
  VS.spacerTop  = document.getElementById('vsSpacerTop');
  VS.spacerBot  = document.getElementById('vsSpacerBot');
  VS.visStart   = 0;
  VS.visEnd     = 0;

  vsRender();  // initial paint

  viewport.addEventListener('scroll', () => {
    if (VS.ticking) return;
    VS.ticking = true;
    requestAnimationFrame(() => {
      vsRender();
      VS.ticking = false;
    });
  }, { passive: true });
}

function vsRender() {
  const vp = VS.viewport;
  if (!vp) return;

  const scrollTop  = vp.scrollTop;
  const vpHeight   = vp.clientHeight;
  const rh         = VS.ROW_H;
  const total      = VS.totalRows;
  const os         = VS.OVERSCAN;

  // thead height (two rows)
  const theadH = 88; // 42 + 46

  const rawStart = Math.floor((scrollTop - theadH) / rh);
  const rawEnd   = Math.ceil((scrollTop - theadH + vpHeight) / rh);

  const newStart = Math.max(0, rawStart - os);
  const newEnd   = Math.min(total, rawEnd   + os);

  // Skip re-paint if window didn't change
  if (newStart === VS.visStart && newEnd === VS.visEnd) return;
  VS.visStart = newStart;
  VS.visEnd   = newEnd;

  const topPx = newStart * rh;
  const botPx = (total - newEnd) * rh;

  VS.spacerTop.style.height = topPx + 'px';
  VS.spacerBot.style.height = botPx + 'px';

  // Build fragment with visible slice
  const frag = document.createDocumentFragment();
  // Re-insert spacer top
  frag.appendChild(VS.spacerTop);

  for (let i = newStart; i < newEnd; i++) {
    const tmp = document.createElement('template');
    tmp.innerHTML = VS.rows[i];
    frag.appendChild(tmp.content.firstChild);
  }

  frag.appendChild(VS.spacerBot);

  // Clear tbody and re-insert
  VS.tbodyEl.textContent = '';
  VS.tbodyEl.appendChild(frag);
}

// ═══════════════════════════════════════════════════════════
// PERF 2 — sessionStorage Price Cache
// ═══════════════════════════════════════════════════════════

// fundCache: in-memory fundamentals store, refilled by _syncFundamentals each session
const fundCache = {};

const PRICE_CACHE_TTL = 5 * 60 * 1000; // 5 minutes

function priceCache_key(stocks) {
  return 'nse_pc_' + stocks.slice().sort().join(',');
}

function priceCache_get(stocks) {
  try {
    const key  = priceCache_key(stocks);
    const raw  = sessionStorage.getItem(key);
    if (!raw) return null;
    const obj  = JSON.parse(raw);
    if (Date.now() - obj.ts > PRICE_CACHE_TTL) {
      sessionStorage.removeItem(key);
      return null;
    }
    return obj.data;
  } catch(e) { return null; }
}

function priceCache_set(stocks, data) {
  try {
    const key = priceCache_key(stocks);
    sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {
    // sessionStorage quota — prune oldest
    try {
      const toDelete = [];
      for (let i = 0; i < sessionStorage.length; i++) {
        const k = sessionStorage.key(i);
        if (k && k.startsWith('nse_pc_')) toDelete.push(k);
      }
      toDelete.forEach(k => sessionStorage.removeItem(k));
      sessionStorage.setItem(priceCache_key(stocks), JSON.stringify({ ts: Date.now(), data }));
    } catch(e2) { /* silently skip */ }
  }
}

// Progress bar helpers
function progressShow(label) {
  const wrap = document.getElementById('fetch-progress-wrap');
  const bar  = document.getElementById('fetch-progress-bar');
  const lbl  = document.getElementById('fetch-progress-label');
  if (!wrap) return;
  wrap.style.display = 'block';
  bar.style.width    = '0%';
  bar.classList.add('indeterminate');
  if (lbl) lbl.textContent = label || '';
}
function progressSet(pct, label) {
  const bar = document.getElementById('fetch-progress-bar');
  const lbl = document.getElementById('fetch-progress-label');
  if (!bar) return;
  bar.classList.remove('indeterminate');
  bar.style.width = pct + '%';
  if (lbl && label) lbl.textContent = label;
}
function progressDone() {
  const wrap = document.getElementById('fetch-progress-wrap');
  const bar  = document.getElementById('fetch-progress-bar');
  if (!bar) return;
  bar.classList.remove('indeterminate');
  bar.style.width = '100%';
  setTimeout(() => { if (wrap) wrap.style.display = 'none'; }, 600);
}

// ═══════════════════════════════════════════════════════════
// PERF 3 — Batch Fetch with Progress
// Replaces the single monolithic fetch with batched chunks
// ═══════════════════════════════════════════════════════════
const BATCH_SIZE = 5;   // stocks per price request

async function fetchStockPricesBatched(stocks) {
  const status = marketStatus();
  const sub    = document.querySelector('.modal-sub');
  if (sub) {
    const dot = status.open ? '🟢' : '🔴';
    sub.innerHTML = `${stocks.length} stocks &nbsp;·&nbsp; ${dot} ${status.reason}`;
  }

  // ── Check sessionStorage cache first ──────────────────────
  const cached = priceCache_get(stocks);
  if (cached) {
    console.log('[Cache] HIT — instant load for', stocks.length, 'stocks');
    // Merge cached fund data then render immediately
    Object.entries(cached).forEach(([sym, q]) => { modalPriceData[sym] = q; });
    renderModalRows(modalPriceData);
    apply52WTints(modalPriceData);

    // Flash cache-hit visual on all rows
    stocks.forEach(s => {
      const row = document.getElementById('row-' + s);
      if (row) { row.classList.add('cache-hit'); setTimeout(() => row.classList.remove('cache-hit'), 600); }
    });

    // Show "instant" in sub
    if (sub) sub.innerHTML += '&nbsp; &nbsp;<span style="color:var(--accent);font-family:Oxanium,sans-serif;font-size:0.65rem;font-weight:800;letter-spacing:0.08em">⚡ INSTANT</span>';
    progressDone();

    // Still sync fundamentals in background (silently)
    _syncFundamentals(stocks, true);
    return;
  }

  console.log('[Cache] MISS — fetching', stocks.length, 'stocks in batches of', BATCH_SIZE);

  // ── Step 1: Fundamentals sync (background, non-blocking) ──
  progressShow('Syncing…');
  _syncFundamentals(stocks, false);

  // ── Step 2: Batch price fetch ──────────────────────────────
  const batches   = [];
  for (let i = 0; i < stocks.length; i += BATCH_SIZE) {
    batches.push(stocks.slice(i, i + BATCH_SIZE));
  }

  let done = 0;
  const allPriceData = {};

  for (const batch of batches) {
    try {
      const url = `${APPS_SCRIPT_URL}?action=prices&symbols=${batch.join(',')}`;
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 15000);
      const res  = await fetch(url, { signal: ctrl.signal, redirect: 'follow' });
      clearTimeout(timer);

      if (res.ok) {
        const json = await res.json();
        const batchData = json.data || {};

        batch.forEach(symbol => {
          const q = batchData[symbol];
          if (q && q.price) {
            const cached = fundCache[symbol.toUpperCase()] || {};
            const fundFields = ['eps','pe','priceToBook','beta','dividendYield','roe','roa','roce',
              'debtToEquity','revenue','netIncome','netProfitMargin','ebitda','operExpense',
              'totalAssets','totalLiab','totalEquity','cashFromOps','freeCashFlow',
              'marketCap','high52','low52','sharesOutstand'];
            const merged = Object.assign({}, q);
            fundFields.forEach(k => { if (cached[k] != null) merged[k] = cached[k]; });
            modalPriceData[symbol] = merged;
            allPriceData[symbol]   = merged;

            // Render this row immediately — don't wait for all batches
            renderModalRows({ [symbol]: merged });
          } else {
            const noDataHtml = `
              <td class="col-sym sym-cell"><span class="sym-name">${symbol}</span>
                <a href="https://www.nseindia.com/get-quotes/equity?symbol=${symbol}" target="_blank" class="sym-link">NSE ↗</a>
              </td>
              <td colspan="9" style="text-align:center;color:var(--muted);font-size:0.75rem">
                No data ${status.open ? '' : '· market closed'}
              </td>`;
            const priceRow = document.getElementById('row-' + symbol);
            if (priceRow) priceRow.innerHTML = noDataHtml;
          }
        });
      }
    } catch(batchErr) {
      console.warn('[Batch] error for', batch, batchErr.message);
      batch.forEach(symbol => {
        const priceRow = document.getElementById('row-' + symbol);
        if (priceRow) priceRow.innerHTML = `
          <td class="col-sym sym-cell"><span class="sym-name">${symbol}</span></td>
          <td colspan="9" style="text-align:center;color:var(--c-mid);font-size:0.75rem">Timeout — retry</td>`;
      });
    }

    done += batch.length;
    const pct = Math.round((done / stocks.length) * 100);
    progressSet(pct, `${done}/${stocks.length}`);
  }

  progressDone();
  apply52WTints(modalPriceData);

  // Check rebuild notice
  const sampleData = Object.values(modalPriceData)[0];
  const noticeEl   = document.getElementById('fund-rebuild-notice');
  if (noticeEl && sampleData) {
    const hasAdvanced = sampleData.roce != null || sampleData.ebitda != null || sampleData.freeCashFlow != null;
    noticeEl.style.display = hasAdvanced ? 'none' : 'block';
  }

  // Save to sessionStorage cache after all batches complete
  if (Object.keys(allPriceData).length > 0) {
    priceCache_set(stocks, allPriceData);
    console.log('[Cache] SET for', stocks.length, 'stocks');
  }
}

// Fundamentals sync — can run silently (background=true skips status UI)
async function _syncFundamentals(stocks, silent) {
  const syncStatusEl = document.getElementById('fund-sync-status');
  const allSymbols   = getAllMasterSymbols();

  try {
    const syncUrl = `${APPS_SCRIPT_URL}?action=syncfundamentals`
                  + `&symbols=${stocks.join(',')}`
                  + `&masterSymbols=${allSymbols.join(',')}`;

    if (!silent && syncStatusEl) {
      syncStatusEl.style.display = 'block';
      syncStatusEl.innerHTML = `<span style="color:#fbbf24">⟳ Syncing fundamentals…</span>`;
    }

    const sCtrl  = new AbortController();
    const sTimer = setTimeout(() => sCtrl.abort(), 25000);
    const sRes   = await fetch(syncUrl, { signal: sCtrl.signal, redirect: 'follow' });
    clearTimeout(sTimer);

    if (sRes.ok) {
      const sJson = await sRes.json();
      if (sJson.data) Object.assign(fundCache, sJson.data);

      if (!silent && syncStatusEl) {
        const parts = [];
        if (sJson.added     && sJson.added.length)     parts.push(`+${sJson.added.length} new`);
        if (sJson.refreshed && sJson.refreshed.length) parts.push(`↻ ${sJson.refreshed.length} refreshed`);
        if (sJson.removed   && sJson.removed.length)   parts.push(`−${sJson.removed.length} removed`);
        if (sJson.skipped   && sJson.skipped.length)   parts.push(`✓ ${sJson.skipped.length} cached`);
        const summary = parts.length ? parts.join('  ·  ') : `✓ ${sJson.total || 0} up to date`;
        syncStatusEl.innerHTML = `<span style="color:#00e5a0">⟳ Fundamentals: ${summary}</span>`;
        setTimeout(() => { if (syncStatusEl) syncStatusEl.style.display = 'none'; }, 4000);
      }
    } else {
      if (!silent && syncStatusEl) {
        syncStatusEl.innerHTML = `<span style="color:#fb7185">⚠ Sync failed — cached data</span>`;
        setTimeout(() => { if (syncStatusEl) syncStatusEl.style.display = 'none'; }, 3000);
      }
    }
  } catch(e) {
    if (!silent && syncStatusEl) {
      syncStatusEl.innerHTML = `<span style="color:#fbbf24">⚠ Sync timeout — cached data</span>`;
      setTimeout(() => { if (syncStatusEl) syncStatusEl.style.display = 'none'; }, 3000);
    }
  }
}

// ── Swipe to switch master timeframes ──────────────────────
let swipeStartX = 0;
let swipeStartY = 0;
let swipeStartTime = 0;
let swipeActive = false;

const SWIPE_MIN_DIST   = 50;  // px
const SWIPE_MAX_TIME   = 400; // ms
const SWIPE_MAX_VERT   = 80;  // px — cancel if too vertical

document.getElementById('mainContent').addEventListener('touchstart', e => {
  if (activeTab !== 'master') return;
  const t = e.touches[0];
  swipeStartX    = t.clientX;
  swipeStartY    = t.clientY;
  swipeStartTime = Date.now();
  swipeActive    = true;
}, { passive: true });

document.getElementById('mainContent').addEventListener('touchmove', e => {
  if (!swipeActive || activeTab !== 'master') return;
  const dx = Math.abs(e.touches[0].clientX - swipeStartX);
  const dy = Math.abs(e.touches[0].clientY - swipeStartY);
  // If strongly vertical, cancel swipe recognition (allow natural scroll)
  if (dy > dx && dy > 20) swipeActive = false;
}, { passive: true });

document.getElementById('mainContent').addEventListener('touchend', e => {
  if (!swipeActive || activeTab !== 'master' || !masterTFs.length) return;
  swipeActive = false;

  const dx   = e.changedTouches[0].clientX - swipeStartX;
  const dy   = Math.abs(e.changedTouches[0].clientY - swipeStartY);
  const dt   = Date.now() - swipeStartTime;
  const dist = Math.abs(dx);

  if (dist < SWIPE_MIN_DIST || dy > SWIPE_MAX_VERT || dt > SWIPE_MAX_TIME) return;

  const dir = dx < 0 ? 'left' : 'right';
  const prev = activeMasterTF;

  if (dir === 'left')  activeMasterTF = (activeMasterTF + 1) % masterTFs.length;
  if (dir === 'right') activeMasterTF = (activeMasterTF - 1 + masterTFs.length) % masterTFs.length;

  if (activeMasterTF === prev) return;

  render();

  // Apply swipe animation direction
  const wrap = document.getElementById('masterWrap');
  if (wrap) {
    wrap.classList.remove('swipe-left', 'swipe-right');
    void wrap.offsetWidth; // force reflow
    wrap.classList.add(dir === 'left' ? 'swipe-left' : 'swipe-right');
    setTimeout(() => wrap.classList.remove('swipe-left', 'swipe-right'), 300);
  }

  // Show toast with TF name
  showKbToast(`${dir === 'left' ? '→' : '←'} <strong>${masterTFs[activeMasterTF].label}</strong>`);
}, { passive: true });

// ── Bottom sheet drag-to-dismiss ───────────────────────────
let sheetDragStartY  = 0;
let sheetDragCurrent = 0;
let sheetDragging    = false;

document.addEventListener('touchstart', e => {
  const modal = document.getElementById('tv-modal');
  if (!modal || !modal.classList.contains('bottom-sheet')) return;
  const inner = modal.querySelector('.modal');
  if (!inner) return;
  // Only drag from the handle area (top 60px of modal)
  const rect = inner.getBoundingClientRect();
  if (e.touches[0].clientY - rect.top > 60) return;
  sheetDragStartY  = e.touches[0].clientY;
  sheetDragCurrent = 0;
  sheetDragging    = true;
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!sheetDragging) return;
  const modal = document.getElementById('tv-modal');
  if (!modal) { sheetDragging = false; return; }
  const inner = modal.querySelector('.modal');
  if (!inner) return;
  const dy = e.touches[0].clientY - sheetDragStartY;
  if (dy < 0) return; // prevent dragging up
  sheetDragCurrent = dy;
  inner.style.transform = `translateY(${dy}px)`;
  inner.style.transition = 'none';
  modal.style.background = `rgba(0,0,0,${Math.max(0.1, 0.7 - dy/500)})`;
}, { passive: true });

document.addEventListener('touchend', () => {
  if (!sheetDragging) return;
  sheetDragging = false;
  const modal = document.getElementById('tv-modal');
  if (!modal) return;
  const inner = modal.querySelector('.modal');
  if (!inner) return;
  inner.style.transition = '';

  if (sheetDragCurrent > 120) {
    // Dismiss
    inner.style.transform = `translateY(100%)`;
    setTimeout(() => { modal.remove(); }, 280);
  } else {
    // Snap back
    inner.style.transform = '';
    modal.style.background = '';
  }
});

const AUTO_REFRESH_MINS = 5;

function startAutoRefresh() {
  clearInterval(autoRefreshTimer);
  clearInterval(countdownTimer);
  secondsLeft = AUTO_REFRESH_MINS * 60;
  updateCountdown();

  countdownTimer = setInterval(() => {
    secondsLeft--;
    updateCountdown();
    if (secondsLeft <= 0) {
      secondsLeft = AUTO_REFRESH_MINS * 60;
      loadSheet();
    }
  }, 1000);
}

  const el = document.getElementById('lastUpdated');
  if (!el) return;
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const timeStr = el.dataset.updated || '';
  el.textContent = `${timeStr}  ·  next refresh ${m}:${s.toString().padStart(2,'0')}`;
}

function exportCSV() {
  document.getElementById('exportDropdown').classList.remove('open');
  // Build CSV from the currently visible table (master TF or consolidated)
  const rows = [];
  if (activeTab === 'master' && masterTFs.length) {
    const tf = masterTFs[activeMasterTF];
    rows.push(['#', ...CATS.map(c => c.label)]);
    const maxRows = Math.max(...tf.cols.map(c => c.length));
    for (let r = 0; r < maxRows; r++) {
      const term = searchTerm.toLowerCase();
      const rowData = [r+1, ...CATS.map((cat, ci) => tf.cols[ci][r] || '')];
      if (term && !rowData.slice(1).some(s => s.toLowerCase().includes(term))) continue;
      rows.push(rowData);
    }
    downloadCSV(rows, `NSE_${tf.label.replace(/\s/g,'_')}_${new Date().toISOString().slice(0,10)}.csv`);
  } else if (activeTab === 'consolidated' && consolidatedTFs.length) {
    rows.push(['Category', ...consolidatedTFs.map(t => t.label)]);
    CATS.forEach(cat => {
      const term = searchTerm.toLowerCase();
      rows.push([cat.label, ...consolidatedTFs.map(tf => {
        let stocks = tf.cols[CATS.indexOf(cat)] || [];
        if (term) stocks = stocks.filter(s => s.toLowerCase().includes(term));
        return stocks.join(' | ');
      })]);
    });
    downloadCSV(rows, `NSE_Consolidated_${new Date().toISOString().slice(0,10)}.csv`);
  } else {
    showKbToast('⚠ No data loaded yet');
  }
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
  showKbToast('✓ CSV downloaded');
}

  try {
    // Create a link to trigger browser print to PDF as an alternative
    // Main approach: serialize visible table to a standalone HTML and open as image
    const isLight = document.body.classList.contains('light-theme');
    const tfLabel = activeTab === 'master' && masterTFs.length ? masterTFs[activeMasterTF].label : 'Consolidated';
    const htmlStr = `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>NSE Snapshot — ${tfLabel}</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oxanium:wght@400;700;800&display=swap" rel="stylesheet">
<style>
body{font-family:Calibri,sans-serif;background:${isLight?'#f0f2f5':'#0a0c10'};color:${isLight?'#0d1117':'#fff'};padding:16px;margin:0}
h2{font-family:'Bebas Neue',sans-serif;letter-spacing:0.14em;color:${isLight?'#007a54':'#00e5a0'};margin-bottom:12px}
table{border-collapse:collapse;width:100%;font-size:0.95rem}
th{font-family:'Oxanium',sans-serif;font-size:0.78rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:8px 12px;background:${isLight?'#e8eaf0':'#181c24'};border-bottom:2px solid ${isLight?'#c8d0e0':'#252e42'};color:${isLight?'#5a6a80':'#8a9ab0'}}
td{padding:8px 12px;border-bottom:1px solid ${isLight?'#dde2ec':'#1e2535'};color:${isLight?'#0d1117':'#fff'}}
.sp{display:inline-block;padding:4px 12px;border-radius:5px;font-weight:700;border:1px solid;font-size:0.9rem}
.acc{color:#007a54;border-color:rgba(0,179,122,0.45);background:rgba(0,179,122,0.1)}
.n50{color:#1a7aba;border-color:rgba(56,189,248,0.45);background:rgba(56,189,248,0.1)}
.nx50{color:#b07d00;border-color:rgba(251,191,36,0.45);background:rgba(251,191,36,0.1)}
.mid{color:#c0243b;border-color:rgba(251,113,133,0.45);background:rgba(251,113,133,0.1)}
.sml{color:#6c42d4;border-color:rgba(167,139,250,0.45);background:rgba(167,139,250,0.1)}
.idx{color:#a8307a;border-color:rgba(244,114,182,0.45);background:rgba(244,114,182,0.1)}
.trd{color:#0892a5;border-color:rgba(34,211,238,0.45);background:rgba(34,211,238,0.1)}
</style></head><body>
<h2>NSE Watchlist · ${tfLabel} · ${new Date().toLocaleString('en-IN')}</h2>
${wrap.innerHTML}
</body></html>`;
    const blob = new Blob([htmlStr], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const win  = window.open(url, '_blank');
    if (win) {
      win.onload = () => { win.print(); URL.revokeObjectURL(url); };
    }
    showKbToast('✓ Snapshot opened — use Print → Save as PDF');
  } catch(err) {
    showKbToast('⚠ Snapshot failed: ' + err.message);
  }
}


// ═══════════════════════════════════════════════════════════
// FEATURE E — Collapsible Categories (consolidated)
// ═══════════════════════════════════════════════════════════
let collapsedCats = new Set();
try {
  const saved = JSON.parse(localStorage.getItem('nse-collapsed-cats') || '[]');
  collapsedCats = new Set(saved);
} catch(e) {}

function saveCollapsed() {
  try { localStorage.setItem('nse-collapsed-cats', JSON.stringify([...collapsedCats])); } catch(e) {}
}

function toggleCatCollapse(catKey) {
  if (collapsedCats.has(catKey)) collapsedCats.delete(catKey);
  else                           collapsedCats.add(catKey);
  saveCollapsed();
  // Toggle DOM class without full re-render for snappiness
  const row = document.querySelector(`tr[data-cat-key="${catKey}"]`);
  if (row) {
    row.classList.toggle('cat-collapsed', collapsedCats.has(catKey));
    const arrow = row.querySelector('.cat-toggle-arrow');
    if (arrow) arrow.textContent = collapsedCats.has(catKey) ? '▶' : '▼';
  }
}

function collapseAllCats() {
  CATS.forEach(c => collapsedCats.add(c.key));
  saveCollapsed();
  render();
}

function expandAllCats() {
  collapsedCats.clear();
  saveCollapsed();
  render();
}

function toggleCollapseAll() {
  if (collapsedCats.size > 0) expandAllCats();
  else collapseAllCats();
}
