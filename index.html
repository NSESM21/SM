body.light-theme th.cat-head { background: #edf0f5; border-color: #c8d0e0; }
body.light-theme th.rn { background: #edf0f5; color: #4a5a70; border-color: #c8d0e0; }
body.light-theme td.rn { background: #f5f7fa; color: #4a5a70; border-color: #c8d0e0; }
body.light-theme tr:hover td { background: rgba(0,0,0,0.025) !important; }

/* Consolidated table */

body.light-theme .con-tbl th.tf-col-hd { color: #0d1117; border-color: #c8d0e0; }
body.light-theme .con-tbl td { color: #0d1117; border-color: #dde2ec; }
body.light-theme .con-tbl td.row-lbl { background: #edf0f5; border-color: #c8d0e0; }
body.light-theme .con-tbl tr:hover td { background: rgba(0,0,0,0.025) !important; }
body.light-theme .con-tbl tr:hover td.row-lbl { background: #edf0f5 !important; }
/* Legend */

/* Fund sync status / notices */
body.light-theme #fund-sync-status { background: rgba(0,0,0,0.04); border-color: #c8d0e0; }
/* Sort bar */

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; overflow-x: hidden; }
body { background: var(--bg); color: var(--text); font-family: Calibri, 'Segoe UI', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(0,229,160,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 90% 100%, rgba(56,189,248,0.05) 0%, transparent 60%);
}

/* ── HEADER ── */
header {
  position: sticky; top: 0; z-index: 300;
  background: rgba(10,12,16,0.98); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border2);
  padding: 0 28px; height: 62px;
  display: flex; align-items: center; gap: 20px;
}
.logo { font-family:'Bebas Neue',sans-serif; font-weight:400; font-size:2rem; letter-spacing:0.08em; color:var(--accent); }
.logo span { color:#ffffff; }
.hdr-div { width:1px; height:30px; background:var(--border2); }
.hdr-sub { font-size:0.82rem; color:#aabcd0; letter-spacing:0.14em; text-transform:uppercase; font-family:'Oxanium',sans-serif; font-weight:600; }

/* live badge */
.live-badge {
  display:flex; align-items:center; gap:6px;
  font-size:0.75rem; color:#ffffff; letter-spacing:0.1em; text-transform:uppercase;
  background:rgba(0,229,160,0.13); border:1px solid rgba(0,229,160,0.4);
  padding:6px 16px; border-radius:20px; font-family:'Oxanium',sans-serif; font-weight:700;
}
.live-dot {
  width:8px; height:8px; border-radius:50%; background:var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 rgba(0,229,160,0.4); }
  50% { opacity:0.5; transform:scale(0.75); box-shadow:0 0 0 4px rgba(0,229,160,0); }
}
.last-updated { font-size:0.72rem; color:#aabcd0; margin-left:4px; font-family:Calibri,sans-serif; }

.search-wrap { margin-left:auto; position:relative; }
#gSearch {
  background:var(--surface2); border:1px solid var(--border2); color:#ffffff;
  font-family:Calibri,sans-serif; font-size:0.97rem;
  padding:8px 15px 8px 36px; border-radius:7px; width:220px; outline:none;
  transition: border-color 0.2s, width 0.3s, box-shadow 0.2s;
}
#gSearch:focus { border-color:var(--accent); width:300px; box-shadow:0 0 0 3px rgba(0,229,160,0.12); }
#gSearch::placeholder { color:var(--muted); }
.si { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.95rem; }

/* refresh btn */
.refresh-btn {
  background:transparent; border:1px solid rgba(255,255,255,0.25); color:#d0dce8;
  padding:7px 18px; border-radius:6px; font-family:'Oxanium',sans-serif;
  font-size:0.76rem; cursor:pointer; letter-spacing:0.08em; font-weight:700;
  transition:all 0.2s; display:flex; align-items:center; gap:6px;
}
.refresh-btn:hover { border-color:var(--accent); color:var(--accent); background:rgba(0,229,160,0.06); }
.refresh-btn.spinning svg { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── SHEET TAB BAR ── */
.sheet-bar {
  position: sticky; top: 62px; z-index: 200;
  background: var(--surface);
  border-bottom: 2px solid var(--border2);
  display: flex; padding: 0 24px;
  overflow-x: auto; scrollbar-width: none;
}
.sheet-bar::-webkit-scrollbar { display: none; }
.stab {
  font-family:'Oxanium',sans-serif; font-size:0.84rem; font-weight:700;
  letter-spacing:0.14em; text-transform:uppercase;
  padding:14px 28px; border:none; background:transparent;
  color:var(--muted); cursor:pointer; white-space:nowrap;
  border-bottom:3px solid transparent; margin-bottom:-2px;
  transition:all 0.2s;
}
.stab:hover { color:var(--text); background:rgba(255,255,255,0.03); }
.stab.active { color:var(--text); border-bottom-color:var(--accent); }
.stab .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px; vertical-align:middle; }

/* ── LOADING / ERROR ── */
.state-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:60vh; gap:16px; color:var(--muted);
}
.spinner {
  width:42px; height:42px; border:2.5px solid var(--border2);
  border-top-color:var(--accent); border-radius:50%;
  animation: spin 0.8s linear infinite;
}
.state-screen h2 { font-family:'Oxanium',sans-serif; font-size:1.15rem; color:var(--text); }
.state-screen p { font-size:0.84rem; max-width:420px; text-align:center; line-height:1.7; }
.err-box {
  background:rgba(251,113,133,0.08); border:1px solid rgba(251,113,133,0.25);
  border-radius:10px; padding:20px 28px; text-align:center;
}
.retry-btn {
  margin-top:14px; background:transparent; border:1px solid var(--c-mid);
  color:var(--c-mid); padding:7px 22px; border-radius:5px;
  font-family:Calibri,sans-serif; font-size:0.82rem; cursor:pointer;
  transition:all 0.2s;
}
.retry-btn:hover { background:rgba(251,113,133,0.1); }

/* ── MAIN TABLE ── */
main { padding: 12px; position:relative; z-index:1; }
.master-wrap {
  border-radius:10px; border:1px solid var(--border2);
  overflow:auto; height:calc(100vh - 168px);
  background:var(--surface);
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
}
table { border-collapse:collapse; white-space:nowrap; width:max-content; min-width:100%; }
thead tr:first-child th { position:sticky; top:0; z-index:20; }
thead tr:nth-child(2) th { position:sticky; top:42px; z-index:19; }
th.rn, td.rn {
  position:sticky; left:0; z-index:25;
  background:var(--surface2); border-right:2px solid var(--border2);
  color:#6a7d96; font-size:0.72rem;
  width:40px; min-width:40px; text-align:center; padding:0 4px;
  font-family:'Oxanium',sans-serif; font-weight:600;
}
thead tr:first-child th.rn, thead tr:nth-child(2) th.rn { z-index:30; }
th.grp-head {
  text-align:center; font-family:'Bebas Neue',sans-serif;
  font-size:1.4rem; font-weight:400; letter-spacing:0.18em; text-transform:uppercase;
  padding:9px 14px; border-right:2px solid var(--border2); border-bottom:1px solid var(--border2);
  background:var(--surface2); height:42px;
}
th.grp-head:last-child { border-right:none; }
th.cat-head {
  font-family:'Oxanium',sans-serif; font-size:0.92rem; font-weight:800;
  letter-spacing:0.12em; text-transform:uppercase;
  padding:12px 16px; border-right:1px solid var(--border); border-bottom:2px solid var(--border2);
  background:var(--surface2); height:46px; width:160px; min-width:150px;
}
th.cat-head.last-in-group { border-right:2px solid var(--border2); }
th.cat-head:last-child { border-right:none; }
td {
  padding:11px 16px; border-right:1px solid var(--border); border-bottom:1px solid var(--border);
  font-size:1.05rem; height:48px; vertical-align:middle;
  width:160px; min-width:150px;
  color:#ffffff; font-family:Calibri,sans-serif;
}
td.last-in-group { border-right:2px solid var(--border2); }
td:last-child { border-right:none; }
tr:last-child td { border-bottom:none; }
tr:hover td { background:rgba(255,255,255,0.035); }
tr:hover td.rn { background:var(--surface2); }
.sp {
  display:inline-block; padding:5px 14px; border-radius:5px;
  font-size:1.02rem; font-weight:700; letter-spacing:0.03em; border:1px solid;
  font-family:Calibri,sans-serif; transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
}
.sp:hover { opacity:0.9; transform:scale(1.05); cursor:default; box-shadow:0 2px 8px rgba(0,0,0,0.4); }
.sp.acc  { color:#00e5a0; border-color:rgba(0,229,160,0.45);  background:rgba(0,229,160,0.12); }
.sp.n50  { color:#38bdf8; border-color:rgba(56,189,248,0.45); background:rgba(56,189,248,0.12); }
.sp.nx50 { color:#fbbf24; border-color:rgba(251,191,36,0.45); background:rgba(251,191,36,0.12); }
.sp.mid  { color:#fb7185; border-color:rgba(251,113,133,0.45);background:rgba(251,113,133,0.12); }
.sp.sml  { color:#a78bfa; border-color:rgba(167,139,250,0.45);background:rgba(167,139,250,0.12); }
.sp.idx  { color:#f472b6; border-color:rgba(244,114,182,0.45);background:rgba(244,114,182,0.12); }
.sp.trd  { color:#22d3ee; border-color:rgba(34,211,238,0.45); background:rgba(34,211,238,0.12); }
.sp.hl   { box-shadow:0 0 0 2px currentColor; font-weight:800; }
mark { background:rgba(0,229,160,0.28); color:var(--accent); border-radius:2px; padding:0 2px; }

/* ── TF PILL SELECTOR BAR ── */
.tf-pill-bar {
  display: flex; flex-wrap: wrap; gap: 9px;
  margin-bottom: 12px; padding: 2px 0;
}
.tf-pill {
  font-family: 'Oxanium', sans-serif; font-size: 0.9rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 8px 20px; border-radius: 24px; border: 1px solid;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
  background: transparent;
}
.tf-pill:hover { opacity: 0.85; transform: translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,0.35); }
.tf-pill.active { font-weight: 800; box-shadow:0 2px 12px rgba(0,0,0,0.3); }

/* legend */
.legend {
  display:flex; flex-wrap:wrap; gap:12px; margin-bottom:12px; align-items:center;
  font-size:0.78rem; color:var(--muted); font-family:'Oxanium',sans-serif;
}
.leg-item { display:flex; align-items:center; gap:6px; font-weight:600; letter-spacing:0.05em; }
.leg-dot { width:10px; height:10px; border-radius:3px; }

/* ── MODAL TABS ── */
.modal-tabs {
  display: flex; gap: 0; border-bottom: 2px solid var(--border2);
  background: var(--surface2); padding: 0 20px;
}
.modal-tab {
  font-family: 'Oxanium', sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 12px 22px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.2s;
}
.modal-tab:hover { color: var(--text); background: rgba(255,255,255,0.03); }
.modal-tab.active { color: var(--text); border-bottom-color: var(--accent); }
.modal-tab-panel { display: none; }
.modal-tab-panel.active { display: block; }

/* ── PRICE TABLE (POPUP) ── */
.price-table { width:100%; border-collapse:collapse; font-size:1.05rem; font-family:Calibri,sans-serif; }
.price-table th {
  font-family:'Oxanium',sans-serif; font-size:0.8rem; font-weight:800;
  letter-spacing:0.12em; text-transform:uppercase; color:#c8d8ea;
  padding:12px 16px; border-bottom:2px solid var(--border2);
  background:var(--surface2); position:sticky; top:0; z-index:5;
  white-space:nowrap;
}
.price-table th.fund-col { color:#fde68a; }
/* ── STICKY FIRST COLUMN ── */
.price-table th.col-sym,
.price-table td.col-sym {
  position: sticky; left: 0; z-index: 4;
  background: var(--surface); border-right: 2px solid var(--border2);
  min-width: 170px;
}
.price-table th.col-sym { background: var(--surface2); z-index: 6; }
.price-table tbody tr:nth-child(even) td.col-sym { background: #13161e; }
.price-table tbody tr:hover td.col-sym { background: #1a1e28 !important; }
.price-table td {
  padding:13px 16px; border-bottom:1px solid var(--border);
  vertical-align:middle; color:var(--text);
  font-family:Calibri,sans-serif; font-size:1.05rem;
}
.price-table td.fund-col { color:var(--text) !important; font-weight:700; }
.price-table tr:last-child td { border-bottom:none; }
.price-table tr:hover td { background:rgba(255,255,255,0.04); }
.price-table tbody tr:nth-child(even) td { background:rgba(255,255,255,0.015); }
.price-table tbody tr:nth-child(even):hover td { background:rgba(255,255,255,0.04); }
.sym-cell { display:flex; align-items:center; gap:10px; }
.sym-name { font-weight:800; font-size:1.1rem; color:var(--text); font-family:Calibri,sans-serif; letter-spacing:0.03em; }
.sym-link {
  font-size:0.65rem; color:var(--muted); text-decoration:none;
  border:1px solid var(--border2); padding:3px 8px; border-radius:4px;
  transition:all 0.15s; font-family:'Oxanium',sans-serif; font-weight:600; letter-spacing:0.06em;
}
.sym-link:hover { color:var(--accent); border-color:var(--accent); background:rgba(0,229,160,0.08); }
.loading-dots { color:var(--muted); font-size:0.8rem; }
.loading-dots span { animation:blink 1.2s infinite; }
.loading-dots span:nth-child(2) { animation-delay:0.2s; }
.loading-dots span:nth-child(3) { animation-delay:0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }

/* color helpers */
.val-green { color: #00e5a0 !important; font-weight: 700; }
.val-red   { color: #fb7185 !important; font-weight: 700; }
.val-yellow{ color: #fbbf24 !important; font-weight: 800; }
.val-purple{ color: #a78bfa !important; font-weight: 800; }

/* ── FUNDAMENTALS CARD GRID ── */
.fund-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 14px; padding: 12px 16px;
}
.fund-card {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 12px; overflow: hidden;
  display: flex; flex-direction: column;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.fund-card:hover { border-color: var(--dim); box-shadow: 0 4px 22px rgba(0,0,0,0.4); }

/* Card header: symbol + price + 52W bar */
.fund-card-hd {
  padding: 13px 16px 12px;
  background: var(--surface);
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
}
.fund-card-sym-wrap { display: flex; align-items: center; gap: 8px; }
.fund-card-sym {
  font-weight: 800; font-size: 1.18rem; color: #ffffff;
  font-family: Calibri, sans-serif; letter-spacing: 0.03em;
}
.fund-card-sym a, .fund-card-sym-link {
  font-size: 0.62rem; color: var(--muted); text-decoration: none;
  border: 1px solid var(--border2); padding: 2px 7px; border-radius: 4px;
  font-family: 'Oxanium', sans-serif; font-weight: 600; transition: all 0.15s;
}
.fund-card-sym a:hover, .fund-card-sym-link:hover { color: var(--accent); border-color: var(--accent); }
.fund-card-price {
  font-family: Calibri, sans-serif; font-size: 1.22rem; font-weight: 800;
  color: #ffffff; text-align: right;
}
.fund-card-price small {
  display: block; font-size: 0.65rem; color: var(--muted);
  font-family: 'Oxanium', sans-serif; font-weight: 600;
  letter-spacing: 0.08em; text-align: right; margin-top: 1px;
}

/* 52W range bar */
.fund-52w-bar-wrap { padding: 8px 14px 10px; border-bottom: 1px solid var(--border); }
.fund-52w-labels { display: flex; justify-content: space-between; margin-bottom: 5px; }
.fund-52w-labels span { font-family: Calibri, sans-serif; font-size: 0.76rem; font-weight: 700; }
.fund-52w-track {
  height: 5px; background: var(--border2); border-radius: 4px;
  position: relative; overflow: hidden;
}
.fund-52w-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, #fb7185, #fbbf24, #00e5a0);
  transition: width 0.6s ease;
}
.fund-52w-thumb {
  position: absolute; top: 50%; transform: translate(-50%,-50%);
  width: 9px; height: 9px; border-radius: 50%;
  background: #fff; border: 2px solid var(--accent);
  box-shadow: 0 0 4px rgba(0,229,160,0.6);
}

/* Metric rows: 2 columns of key-value pairs */
.fund-metrics-body { padding: 10px 12px; display: flex; flex-direction: column; gap: 4px; }
.fund-metric-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px;
}
.fund-metric {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border-radius: 6px;
  padding: 7px 12px; border: 1px solid var(--border);
  gap: 6px;
}
.fund-metric-label {
  font-family: 'Oxanium', sans-serif; font-size: 0.66rem; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
}
.fund-metric-value {
  font-size: 1.05rem; font-weight: 800;
  font-family: Calibri, sans-serif; text-align: right; white-space: nowrap;
}
.fund-metric-value.dim { color: var(--border2) !important; font-weight: 400; }

/* Card footer: cap + EBITDA + FCF wide row */
.fund-card-footer {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  border-top: 1px solid var(--border2);
}
.fund-footer-cell {
  padding: 9px 10px; text-align: center;
  border-right: 1px solid var(--border);
}
.fund-footer-cell:last-child { border-right: none; }
.fund-footer-label {
  font-family: 'Oxanium', sans-serif; font-size: 0.62rem; font-weight: 700;
  letter-spacing: 0.09em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px;
}
.fund-footer-value { font-size: 1.0rem; font-weight: 800; font-family: Calibri, sans-serif; }

/* loading card skeleton */
.fund-card-loading {
  display: flex; align-items: center; justify-content: center;
  min-height: 140px; color: var(--muted); gap: 8px;
  font-family: 'Oxanium', sans-serif; font-size: 0.75rem; letter-spacing: 0.08em;
}

/* compact price-table in mobile mode */
body.mobile-view .price-table th { font-size: 0.66rem !important; padding: 8px 10px !important; min-width: unset !important; }
body.mobile-view .price-table td { padding: 9px 10px !important; font-size: 0.88rem !important; }
body.mobile-view .modal { max-width: 98vw; }
body.mobile-view .modal-hd { padding: 12px 16px; }
body.mobile-view .modal-title { font-size: 1.3rem; }

/* ══════════════════════════════════════════
   MOBILE — Touch-friendly pill sizes
══════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Make pills much easier to tap — minimum 44px touch target */
  .sp {
    padding: 8px 16px !important;
    font-size: 0.92rem !important;
    min-height: 38px !important;
    display: inline-flex !important;
    align-items: center !important;
    border-radius: 8px !important;
  }
  .tf-pill {
    padding: 10px 18px !important;
    font-size: 0.82rem !important;
    min-height: 42px !important;
    border-radius: 28px !important;
  }
  .pill-xs {
    padding: 6px 12px !important;
    font-size: 0.82rem !important;
    min-height: 36px !important;
    display: inline-flex !important;
    align-items: center !important;
  }
  .pill-sm {
    padding: 6px 12px !important;
    font-size: 0.8rem !important;
    min-height: 36px !important;
  }
  /* Larger row height for touch */
  .master-wrap td { height: 54px !important; padding: 10px 12px !important; }
  .master-wrap th.cat-head { height: 38px !important; font-size: 0.76rem !important; padding: 8px 12px !important; }
  .master-wrap th.grp-head { height: 38px !important; font-size: 1.1rem !important; }
  /* Larger sheet tabs */
  .stab { padding: 16px 20px !important; font-size: 0.8rem !important; }
  /* Header compact on mobile */
  .hdr-sub { display: none; }
  .hdr-div:not(:last-of-type) { display: none; }
  .search-wrap { margin-left: auto; }
  #gSearch { width: 160px !important; }
  #gSearch:focus { width: 220px !important; }
  /* Con table touch */
  .con-tbl td, .con-tbl th { padding: 10px 14px !important; font-size: 0.8rem !important; }
  .con-tbl .pill-wrap { max-width: 160px; }
  /* Larger touch targets for export/theme buttons */
  .export-btn, .theme-btn, .refresh-btn { padding: 10px 14px !important; }
  .sort-btn { padding: 8px 14px !important; font-size: 0.78rem !important; min-height: 40px; }
  /* ── CRITICAL: Full-width scroll fix on mobile ── */
  main { padding: 6px !important; }
  .master-wrap {
    width: 100vw !important;
    max-width: 100vw !important;
    border-radius: 6px !important;
    overflow-x: scroll !important;
    overflow-y: auto !important;
  }
  .master-wrap table {
    width: max-content !important;
    min-width: 900px !important;
  }
  .con-tbl-wrap {
    width: 100vw !important;
    max-width: 100vw !important;
    border-radius: 6px !important;
    overflow-x: scroll !important;
    overflow-y: auto !important;
  }
  .con-tbl {
    width: max-content !important;
    min-width: 900px !important;
  }
}

/* ══════════════════════════════════════════
   MOBILE — Swipe gesture indicator
══════════════════════════════════════════ */
.swipe-hint {
  display: none;
  align-items: center; justify-content: center; gap: 8px;
  padding: 5px 0 2px;
  font-family: 'Oxanium', sans-serif; font-size: 0.66rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  user-select: none; pointer-events: none;
}
.swipe-hint-dots { display: flex; gap: 5px; align-items: center; }
.swipe-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--border2); transition: all 0.25s ease;
}
.swipe-dot.active {
  width: 18px; border-radius: 4px;
  background: var(--accent);
}
@media (max-width: 768px) {
  .swipe-hint { display: flex; }
}

/* Swipe animation — slide in from left/right */
@keyframes swipeInLeft  { from { transform: translateX(-28px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes swipeInRight { from { transform: translateX(28px);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.master-wrap.swipe-left  { animation: swipeInLeft  0.22s ease; }
.master-wrap.swipe-right { animation: swipeInRight 0.22s ease; }

/* ══════════════════════════════════════════
   MOBILE — Bottom sheet modal
══════════════════════════════════════════ */
@media (max-width: 768px) {
  .modal-overlay.bottom-sheet {
    align-items: flex-end;
    padding: 0;
    background: rgba(0,0,0,0.7);
  }
  .modal-overlay.bottom-sheet .modal {
    max-width: 100%;
    width: 100%;
    max-height: 92vh;
    border-radius: 20px 20px 0 0;
    border-bottom: none;
    animation: sheetUp 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  }
  @keyframes sheetUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }
  /* Drag handle */
  .modal-overlay.bottom-sheet .modal::before {
    content: '';
    display: block;
    width: 40px; height: 5px; border-radius: 3px;
    background: var(--border2);
    margin: 10px auto 0;
    flex-shrink: 0;
  }
  .modal-overlay.bottom-sheet .modal-hd {
    border-radius: 0;
    padding: 10px 18px 14px;
  }
  .modal-overlay.bottom-sheet .modal-title { font-size: 1.4rem; }
  /* Fund grid single column on mobile */
  .fund-grid {
    grid-template-columns: 1fr !important;
  }
  /* Price table horizontal scroll */
  #mpanel-price { overflow-x: auto; }
}

/* Light theme bottom sheet handle */
body.light-theme .modal-overlay.bottom-sheet .modal::before {
  background: #c8d0e0;
}

/* ══════════════════════════════════════════
   PERF — Batch progress bar
══════════════════════════════════════════ */
#fetch-progress-wrap {
  height: 3px; background: var(--border);
  position: relative; overflow: hidden;
  flex-shrink: 0;
}
#fetch-progress-bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--accent), #38bdf8);
  transition: width 0.3s ease;
  border-radius: 0 2px 2px 0;
}
#fetch-progress-bar.indeterminate {
  width: 35% !important;
  animation: indeterminate 1.4s ease infinite;
}
@keyframes indeterminate {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(340%); }
}
#fetch-progress-label {
  position: absolute; right: 12px; top: 5px;
  font-family: 'Oxanium', sans-serif; font-size: 0.6rem;
  font-weight: 700; letter-spacing: 0.1em; color: var(--muted);
  text-transform: uppercase; pointer-events: none;
}

/* ══════════════════════════════════════════
   PERF — Virtual scroll container
══════════════════════════════════════════ */
.vs-viewport {
  overflow-y: auto;
  overflow-x: hidden;
  height: calc(100vh - 168px);
  position: relative;
  will-change: transform;
}
.vs-spacer-top, .vs-spacer-bot {
  width: 100%;
  background: transparent;
  flex-shrink: 0;
}
/* Keep the real table inside virtual scroll */
.master-wrap {
  border-radius: 10px; border: 1px solid var(--border2);
  overflow: visible;
  background: var(--surface);
}
.vs-viewport .master-wrap {
  border-radius: 0;
  border: none;
  border-top: 1px solid var(--border2);
}

/* Cache hit flash on modal rows */
@keyframes cacheFlash {
  0%   { background: rgba(0,229,160,0.18); }
  100% { background: transparent; }
}
.cache-hit td { animation: cacheFlash 0.5s ease forwards; }
::-webkit-scrollbar { width:8px; height:8px; }
::-webkit-scrollbar-track { background:var(--surface); border-radius:6px; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:6px; border:2px solid var(--surface); }
::-webkit-scrollbar-thumb:hover { background:var(--dim); }

/* ══════════════════════════════════════════
   FEATURE 1 — Health Score badge
══════════════════════════════════════════ */
.health-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 11px 4px 8px; border-radius: 20px; border: 1px solid;
  font-family: 'Oxanium', sans-serif; font-size: 0.7rem; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.health-badge .hb-score { font-size: 0.92rem; font-weight: 900; }

/* ══════════════════════════════════════════
   FEATURE 2 — Sort bar
══════════════════════════════════════════ */
.fund-sort-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 8px 16px; border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.fund-sort-label {
  font-family: 'Oxanium', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase;
  margin-right: 4px;
}
.sort-btn {
  font-family: 'Oxanium', sans-serif; font-size: 0.74rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 14px; border: 1px solid var(--border2);
  background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.sort-btn:hover { color: var(--text); border-color: var(--border2); background: rgba(255,255,255,0.04); }
.sort-btn.active { background: rgba(0,229,160,0.13); border-color: rgba(0,229,160,0.5); color: var(--accent); }
.sort-btn.active .sort-arrow { display: inline; }
.sort-arrow { display: none; font-size: 0.62rem; margin-left: 3px; }

/* ══════════════════════════════════════════
   FEATURE 3 — Stagger card animation
══════════════════════════════════════════ */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(14px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.fund-card.animate-in {
  animation: cardIn 0.32s ease both;
}

/* ══════════════════════════════════════════
   FEATURE 4 — Keyboard shortcut toast
══════════════════════════════════════════ */
#kb-toast {
  position: fixed; bottom: 28px; right: 24px; z-index: 5000;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 12px 18px;
  font-family: 'Oxanium', sans-serif; font-size: 0.72rem;
  color: var(--muted); pointer-events: none;
  opacity: 0; transform: translateY(8px);
  transition: opacity 0.2s, transform 0.2s;
  box-shadow: 0 8px 28px rgba(0,0,0,0.5);
  max-width: 220px;
}
#kb-toast.show { opacity: 1; transform: translateY(0); }
#kb-toast strong { color: var(--accent); font-size: 0.8rem; }

/* ══════════════════════════════════════════
   FEATURE 5 — Tab count badges
══════════════════════════════════════════ */
.tab-badge {
  display: inline-block; font-size: 0.6rem; font-weight: 800;
  padding: 1px 7px; border-radius: 10px; margin-left: 7px;
  background: var(--border2); color: #c8d8ea;
  font-family: 'Oxanium', sans-serif; letter-spacing: 0.06em;
  vertical-align: middle; transition: background 0.2s;
}
.stab.active .tab-badge { background: rgba(0,229,160,0.2); color: var(--accent); }

/* ══════════════════════════════════════════
   FEATURE 6 — Modal tab memory (no CSS needed)
══════════════════════════════════════════ */

/* ══════════════════════════════════════════
   FEATURE 7 — Undervalued glow
══════════════════════════════════════════ */
.fund-card.undervalued {
  border-color: rgba(0,229,160,0.45) !important;
  box-shadow: 0 0 0 1px rgba(0,229,160,0.2), 0 4px 22px rgba(0,229,160,0.12) !important;
}
.undervalued-tag {
  font-family: 'Oxanium', sans-serif; font-size: 0.58rem; font-weight: 800;
  letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase;
  background: rgba(0,229,160,0.12); border: 1px solid rgba(0,229,160,0.35);
  padding: 2px 7px; border-radius: 10px; margin-left: 6px;
}

/* ══════════════════════════════════════════
   FEATURE 8 — 52W row tint in master table
══════════════════════════════════════════ */
tr.w52-high td { background: rgba(0,229,160,0.04) !important; }
tr.w52-low  td { background: rgba(251,113,133,0.04) !important; }
tr.w52-high td.rn { background: var(--surface2) !important; }
tr.w52-low  td.rn { background: var(--surface2) !important; }
tr.w52-high:hover td { background: rgba(0,229,160,0.08) !important; }
tr.w52-low:hover  td { background: rgba(251,113,133,0.08) !important; }

.view-toggle {
  display: flex; align-items: center; gap: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; overflow: hidden; flex-shrink: 0;
}
.view-btn {
  font-family: 'Oxanium', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 7px 13px; border: none; background: transparent;
  color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px;
  transition: all 0.18s; white-space: nowrap;
}
.view-btn:hover { color: var(--text); }
.view-btn.active { background: var(--accent); color: #0a0c10; }
.view-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.view-divider { width: 1px; height: 100%; background: var(--border2); }

/* ── BODY VIEW MODE CLASSES ── */
body.mobile-view {
  --row-h: 36px; --cell-pad: 6px 10px; --cell-fs: 0.82rem;
  --sp-pad: 3px 9px; --sp-fs: 0.78rem; --hdr-fs: 0.72rem;
}
body.desktop-view {
  --row-h: 48px; --cell-pad: 11px 16px; --cell-fs: 1.05rem;
  --sp-pad: 5px 14px; --sp-fs: 1.02rem; --hdr-fs: 0.92rem;
}
body.mobile-view td { padding: var(--cell-pad) !important; font-size: var(--cell-fs) !important; height: var(--row-h) !important; }
body.mobile-view th.cat-head { font-size: var(--hdr-fs) !important; padding: 7px 10px !important; height: 34px !important; }
body.mobile-view th.grp-head { font-size: 1.1rem !important; height: 34px !important; padding: 6px 10px !important; }
body.mobile-view .sp { padding: var(--sp-pad) !important; font-size: var(--sp-fs) !important; }
body.mobile-view .tf-pill { padding: 5px 13px !important; font-size: 0.76rem !important; }
body.mobile-view .pill-sm { font-size: 0.68rem !important; padding: 3px 8px !important; }
body.mobile-view .cat-row { padding: 8px 12px !important; }
body.mobile-view .cat-row-label { font-size: 0.7rem !important; min-width: 72px !important; }
body.mobile-view .con-tbl-wrap { font-size: 0.78rem; }
body.mobile-view .con-tbl th { font-size: 0.65rem !important; padding: 5px 8px !important; }
body.mobile-view .con-tbl td { font-size: 0.72rem !important; padding: 5px 8px !important; }

/* ── CONSOLIDATED TABLE LAYOUT ── */
.con-tbl-wrap {
  border-radius: 10px; border: 1px solid var(--border2);
  overflow: auto; background: var(--surface);
  height: calc(100vh - 168px);
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x pan-y;
}
.con-tbl {
  border-collapse: collapse; white-space: nowrap; width: max-content; min-width: 100%;
}
.con-tbl thead tr:first-child th { position: sticky; top: 0; z-index: 20; }
.con-tbl thead tr:nth-child(2) th { position: sticky; top: 38px; z-index: 19; }
.con-tbl th {
  font-family: 'Oxanium', sans-serif; font-size: 0.8rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 9px 12px; border-right: 1px solid var(--border);
  border-bottom: 2px solid var(--border2);
  background: var(--surface2); color: var(--muted);
  white-space: nowrap;
}
.con-tbl th.tf-col-hd {
  font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; font-weight: 400;
  letter-spacing: 0.16em; text-align: center;
  border-right: 2px solid var(--border2); color: #fff;
  padding: 8px 16px;
}
.con-tbl th.cat-hd { color: #c8d8ea; text-align: center; }
.con-tbl th.row-lbl-hd {
  position: sticky; left: 0; z-index: 22; background: var(--surface2);
  border-right: 2px solid var(--border2); min-width: 110px;
  color: var(--muted);
}
.con-tbl td {
  padding: 9px 12px; border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border); vertical-align: middle;
  font-size: 0.92rem;
}
.con-tbl td.row-lbl {
  position: sticky; left: 0; z-index: 10; background: var(--surface2);
  border-right: 2px solid var(--border2);
  font-family: 'Oxanium', sans-serif; font-size: 0.75rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
}
.con-tbl td.tf-sep { border-right: 2px solid var(--border2); }
.con-tbl tr:hover td { background: rgba(255,255,255,0.035); }
.con-tbl tr:hover td.row-lbl { background: var(--surface2); }
.con-tbl tr:last-child td { border-bottom: none; }
.con-tbl .pill-wrap { display: flex; flex-wrap: wrap; gap: 4px; max-width: 200px; }
.con-tbl .pill-xs {
  font-size: 0.74rem; padding: 3px 9px; border-radius: 4px;
  border: 1px solid; font-weight: 700; cursor: pointer;
  font-family: Calibri, sans-serif; white-space: nowrap;
  transition: opacity 0.15s, transform 0.12s;
}
.con-tbl .pill-xs:hover { opacity: 0.8; transform: scale(1.08); }
.con-tbl .empty-cell { color: var(--border2); font-size: 0.75rem; text-align: center; }
.con-tbl .clickable-cell { cursor: pointer; }
.con-tbl .clickable-cell:hover { background: rgba(255,255,255,0.05) !important; }

/* keep old card styles for reference — hidden when table mode active */
/* ── CONSOLIDATED CARDS (legacy) ── */
.con-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 20px; padding: 4px;
}
.con-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 14px; overflow: hidden;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.con-card:hover { border-color: var(--dim); box-shadow:0 6px 28px rgba(0,0,0,0.35); }
.con-card-hd {
  padding: 16px 20px; border-bottom: 2px solid var(--border2);
  background: var(--surface2);
  display: flex; align-items: center; justify-content: space-between;
}
.con-card-title {
  font-family: 'Bebas Neue', sans-serif; font-weight: 400;
  font-size: 1.4rem; letter-spacing: 0.14em; text-transform: uppercase;
}
.con-card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
.cat-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 15px; border-radius: 9px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.18s;
}
.cat-row:hover { border-color: var(--border2); transform: translateX(5px); background: rgba(255,255,255,0.04); box-shadow:0 3px 14px rgba(0,0,0,0.3); }
.cat-row-label {
  font-family: 'Oxanium', sans-serif; font-size: 0.78rem;
  font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  min-width: 90px;
}
.cat-row-pills { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
.cat-row-count {
  font-size: 0.72rem; background: var(--border2); padding: 3px 11px;
  border-radius: 20px; color: #c8d8e8; white-space: nowrap;
  font-family:'Oxanium',sans-serif; font-weight:700;
}
.cat-row-arrow { color: #6a7d96; font-size: 1.1rem; font-weight: 700; }
.pill-sm {
  font-size: 0.78rem; padding: 4px 11px; border-radius: 5px;
  border: 1px solid; white-space: nowrap; font-weight:700;
  font-family:Calibri,sans-serif;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(0,0,0,0.84); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  padding: 12px; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.modal {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 16px; width: 100%; max-width: 96vw;
  max-height: 94vh; display: flex; flex-direction: column;
  animation: slideUp 0.22s ease; box-shadow:0 28px 90px rgba(0,0,0,0.7);
}
@keyframes slideUp { from { transform:translateY(28px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.modal-hd {
  padding: 18px 26px; border-bottom: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border-radius: 16px 16px 0 0; flex-shrink: 0;
}
.modal-title { font-family: 'Bebas Neue', sans-serif; font-weight: 400; font-size: 1.7rem; letter-spacing: 0.1em; }
.modal-sub { font-size: 0.78rem; color: #a0b4c8; margin-top: 4px; font-family:'Oxanium',sans-serif; letter-spacing:0.07em; }
.modal-close {
  background: var(--border2); border: none; color: var(--text);
  width: 34px; height: 34px; border-radius: 50%; cursor: pointer;
  font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--c-mid); transform:scale(1.12); }
.modal-body { flex: 1; overflow: auto; padding: 0; min-height: 0; }
.tv-stock-row {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 12px; margin-bottom: 12px;
}
.tv-stock-label {
  display: flex; align-items: center;
  font-size: 0.72rem; font-weight: 600; color: var(--text);
  padding: 6px 0;
}
.tv-widget-wrap {
  border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border); height: 56px;
}

/* ── THEME TOGGLE BUTTON ── */
.theme-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.22);
  color: #d0dce8; padding: 7px 12px; border-radius: 6px;
  cursor: pointer; font-size: 1rem; transition: all 0.2s;
  display: flex; align-items: center; gap: 5px;
  font-family: 'Oxanium', sans-serif; font-size: 0.76rem; font-weight: 700;
  letter-spacing: 0.06em;
}
.theme-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.06); }

/* ── EXPORT BUTTON ── */
.export-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.22);
  color: #d0dce8; padding: 7px 14px; border-radius: 6px;
  cursor: pointer; font-family: 'Oxanium', sans-serif;
  font-size: 0.76rem; font-weight: 700; letter-spacing: 0.08em;
  transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  position: relative;
}
.export-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,229,160,0.06); }
.export-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; overflow: hidden;
  box-shadow: 0 8px 28px rgba(0,0,0,0.45); z-index: 999;
  min-width: 160px; display: none;
}
.export-dropdown.open { display: block; animation: fadeIn 0.12s ease; }
.export-opt {
  display: flex; align-items: center; gap: 9px;
  padding: 11px 16px; cursor: pointer;
  font-family: 'Oxanium', sans-serif; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; color: var(--muted); transition: all 0.15s;
  border: none; background: transparent; width: 100%; text-align: left;
}
.export-opt:hover { background: rgba(0,229,160,0.08); color: var(--accent); }
.export-opt + .export-opt { border-top: 1px solid var(--border); }

/* ── COLLAPSIBLE CATEGORY ROWS (consolidated) ── */
.cat-row-toggle {
  cursor: pointer; user-select: none;
  transition: opacity 0.15s;
}
.cat-row-toggle:hover { opacity: 0.8; }
.con-tbl tr.cat-collapsed td:not(.row-lbl) { display: none; }
.col-collapse-all {
  font-family: 'Oxanium', sans-serif; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.06em; padding: 3px 9px; border-radius: 4px;
  cursor: pointer; border: 1px solid var(--border2); background: transparent;
  color: var(--muted); transition: all 0.15s; white-space: nowrap;
}
.col-collapse-all:hover { border-color: var(--accent); color: var(--accent); }


</style>
</head>
<body>

  <div class="logo">NEW<span>NSE</span></div>
  <div class="hdr-div"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — Your Google Sheet ID
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwQMJfNwo33G_BxBhvDXNb0NY8kPMq97-l_XvWvvgDUdCipwAYRgDXBDkGtCRGwI780/exec';

// Category definitions (column order within each timeframe group)
const CATS = [
  { key:'ACC',  label:'Accumulate', cls:'acc', color:'#00e5a0' },
  { key:'N50',  label:'Nifty 50',   cls:'n50', color:'#38bdf8' },
  { key:'NX50', label:'Next 50',    cls:'nx50',color:'#fbbf24' },
  { key:'MID',  label:'Mid 50',     cls:'mid', color:'#fb7185' },
  { key:'SML',  label:'Small 50',   cls:'sml', color:'#a78bfa' },
  { key:'IDX',  label:'Index',      cls:'idx', color:'#f472b6' },
  { key:'TRD',  label:'Trading',    cls:'trd', color:'#22d3ee' },
];

// Timeframe groups: label, color, startCol (0-based col index of their ACC column)
// Row 1 headers tell us: 15min=A(0), 1HR=H(7), DAILY R2=O(14), DAILY R4=V(21),
//   MONTHLY R2=AC(28), MONTHLY R4=AJ(35), MONTHLY S4=AQ(42)
// Consolidated: M-D-H=AX(49), D-H=AZ+?(53?), H-15m, D:R2&H:R4
// We'll auto-detect from Row 1 headers instead of hardcoding col positions

const TF_COLORS = {
  '15 MIN R4':   '#00e5a0',
  '15MIN R4':    '#00e5a0',
  '1 HOUR R4':   '#38bdf8',
  '1HR R4':      '#38bdf8',
  'DAILY R2':    '#fbbf24',
  'DAILY - R2':  '#fbbf24',
  'DAILY R4':    '#fb7185',
  'DAILY - R4':  '#fb7185',
  'MONTHLY R2':  '#a78bfa',
  'MONTHLY - R2':'#a78bfa',
  'MONTHLY R4':  '#f472b6',
  'MONTHLY - R4':'#f472b6',
  'MONTHLY S4':  '#34d399',
  'MONTHLY - S4':'#34d399',
  'M-D-H: R4':   '#818cf8',
  'M-D-H R4':    '#818cf8',
  'D-H: R4':     '#fb923c',
  'D-H R4':      '#fb923c',
  'H-15M: R4':   '#e879f9',
  'H-15M R4':    '#e879f9',
  'D:R2 & H: R4':'#2dd4bf',
  'D:R2 & H:R4': '#2dd4bf',
};

// Which TFs go on Master vs Consolidated tab
// Master = the 7 core timeframes
const MASTER_TF_KEYWORDS = ['15 MIN','1 HOUR','1HR','DAILY','MONTHLY'];
// Consolidated = the 4 combined timeframes — use START-of-label matching
const CONSOLIDATED_TF_STARTS = ['M-D-H','D-H:','D-H ','H-15','D:R2'];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let masterTFs = [];
let consolidatedTFs = [];
let activeTab = 'master';
let activeMasterTF = 0; // index of currently selected master TF
let searchTerm = '';

// ── Returns a deduplicated list of ALL symbols across ALL timeframes ──────
function getAllMasterSymbols() {
  const all = new Set();
  [...masterTFs, ...consolidatedTFs].forEach(tf => {
    tf.cols.forEach(col => col.forEach(sym => { if (sym) all.add(sym.trim().toUpperCase()); }));
  });
  return [...all];
}

// ═══════════════════════════════════════════════════════════
// FETCH & PARSE
// ═══════════════════════════════════════════════════════════
async function loadSheet() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  showLoading();

  try {
    console.log('Fetching from Apps Script...');
    const controller = new AbortController();
    const timerId = setTimeout(() => controller.abort(), 12000);
    const res = await fetch(APPS_SCRIPT_URL, {
      signal: controller.signal,
      redirect: 'follow',
    });
    clearTimeout(timerId);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const data = json.data || json; // support both old and new Apps Script format
    console.log('✓ Got data:', data.length, 'rows,', data[0]?.length, 'cols');
    parseSheetRows(data);
    document.getElementById('lastUpdated').textContent =
      '· ' + new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit' });
    const el = document.getElementById('lastUpdated');
    el.dataset.updated = el.textContent;
    render();
  } catch(e) {
    console.error('Fetch failed:', e);
    showError(`
      Failed to load data: <strong>${e.message}</strong><br><br>
      Make sure your Apps Script is deployed as a Web App with<br>
      <strong style="color:var(--accent)">Who has access: Anyone</strong><br><br>
      <small style="opacity:0.5">Then click Refresh ↺</small>
    `);
  } finally {
    btn.classList.remove('spinning');
  }
}

// Parse rows into TF groups
function parseSheetRows(rows) {
  console.log('Parsing', rows.length, 'rows,', rows[0]?.length, 'cols');
  if (rows.length < 3) { showError(`Sheet has only ${rows.length} rows.`); return; }

  const KNOWN_TFS = [
    { match:'15 MIN',       label:'15 Min R4',    color:'#00e5a0', group:'master' },
    { match:'1 HOUR',       label:'1 Hour R4',    color:'#38bdf8', group:'master' },
    { match:'DAILY - R2',   label:'Daily R2',     color:'#fbbf24', group:'master' },
    { match:'DAILY R2',     label:'Daily R2',     color:'#fbbf24', group:'master' },
    { match:'DAILY - R4',   label:'Daily R4',     color:'#fb7185', group:'master' },
    { match:'DAILY R4',     label:'Daily R4',     color:'#fb7185', group:'master' },
    { match:'MONTHLY - R2', label:'Monthly R2',   color:'#a78bfa', group:'master' },
    { match:'MONTHLY R2',   label:'Monthly R2',   color:'#a78bfa', group:'master' },
    { match:'MONTHLY - R4', label:'Monthly R4',   color:'#f472b6', group:'master' },
    { match:'MONTHLY R4',   label:'Monthly R4',   color:'#f472b6', group:'master' },
    { match:'MONTHLY - S4', label:'Monthly S4',   color:'#34d399', group:'master' },
    { match:'MONTHLY S4',   label:'Monthly S4',   color:'#34d399', group:'master' },
    { match:'M-D-H',        label:'M-D-H: R4',   color:'#818cf8', group:'consolidated' },
    { match:'D-H',          label:'D-H: R4',      color:'#fb923c', group:'consolidated' },
    { match:'H-15',         label:'H-15m: R4',    color:'#e879f9', group:'consolidated' },
    { match:'D:R2',         label:'D:R2 & H:R4',  color:'#2dd4bf', group:'consolidated' },
  ];

  // Scan ALL rows for TF headers — NO column blocking since consolidated TFs
  // share the same column area but appear in different rows
  const tfGroups = [];
  const seenLabels = new Set();

  for (let r = 0; r < rows.length - 1; r++) {
    for (let c = 0; c < (rows[r] || []).length; c++) {
      const cell = (rows[r][c] || '').replace(/"/g,'').trim().toUpperCase();
      if (!cell || cell === '#N/A' || cell.startsWith('#')) continue;

      // Match against known TF keywords
      const tfDef = KNOWN_TFS.find(t => {
        // For M-D-H, must match exactly to avoid matching D-H inside M-D-H
        if (t.match === 'D-H') return cell.includes('D-H') && !cell.includes('M-D-H');
        return cell.includes(t.match.toUpperCase());
      });
      if (!tfDef) continue;
      if (seenLabels.has(tfDef.label)) continue;

      // Confirm: row below at same col must be ACCUMULATE
      const belowCell = ((rows[r+1] || [])[c] || '').replace(/"/g,'').trim().toUpperCase();
      if (!belowCell.includes('ACCUM')) continue;

      seenLabels.add(tfDef.label);
      tfGroups.push({
        label: tfDef.label,
        color: tfDef.color,
        group: tfDef.group,
        startCol: c,
        dataStartRow: tfDef.group === 'consolidated' ? r + 1 : r + 2
      });
      console.log('Found:', tfDef.label, '@ row', r, 'col', c);
    }
  }

  console.log('All groups found:', tfGroups.map(t => t.label));

  // Category label to column index mapping (for horizontal master TFs)
  const CAT_LABELS = ['ACCUM','NIFTY5','NEXT5','MID5','SMALL5','INDEX','TRAD'];

  // Extract stock data for each TF group
  const allTFs = [];
  for (const tf of tfGroups) {
    const cols = [[], [], [], [], [], [], []];

    if (tf.group === 'master') {
      // HORIZONTAL layout: 7 side-by-side columns, stocks go downward row by row
      for (let r = tf.dataStartRow; r < rows.length; r++) {
        // Stop if we hit another TF header in this column
        const headerCheck = ((rows[r] || [])[tf.startCol] || '').replace(/"/g,'').trim().toUpperCase();
        if (headerCheck && KNOWN_TFS.some(t => headerCheck.includes(t.match.toUpperCase()))) break;
        for (let ci = 0; ci < 7; ci++) {
          const val = ((rows[r] || [])[tf.startCol + ci] || '').replace(/"/g,'').trim();
          if (val && val !== '#N/A' && !val.startsWith('#') && !val.includes(',')) {
            cols[ci].push(val);
          }
        }
      }
    } else {
      // VERTICAL layout: category label in col c, comma-separated stocks in col c+1
      // Rows go: ACCUMULATE | stocks, NIFTY50 | stocks, NEXT50 | stocks, ...
      const catMap = {
        'ACCUM': 0, 'NIFTY': 1, 'NEXT': 2, 'MID': 3, 'SMALL': 4, 'INDEX': 5, 'TRAD': 6
      };
      for (let r = tf.dataStartRow; r < rows.length; r++) {
        const labelCell = ((rows[r] || [])[tf.startCol] || '').replace(/"/g,'').trim().toUpperCase();
        const stockCell = ((rows[r] || [])[tf.startCol + 1] || '').replace(/"/g,'').trim();

        // Stop when we hit next TF header
        if (labelCell && KNOWN_TFS.some(t => labelCell.includes(t.match.toUpperCase()))) break;

        // Find which category this row belongs to
        let catIdx = -1;
        for (const [key, idx] of Object.entries(catMap)) {
          if (labelCell.startsWith(key)) { catIdx = idx; break; }
        }
        if (catIdx === -1) continue;

        // Split comma-separated stocks into array
        if (stockCell) {
          const stocks = stockCell.split(',').map(s => s.trim()).filter(s => s && s !== '#N/A' && !s.startsWith('#'));
          cols[catIdx].push(...stocks);
        }
      }
    }

    allTFs.push({ key: tf.label.replace(/\s+/g,'_').toLowerCase(), label: tf.label, color: tf.color, cols });
  }

  // Split: master group vs consolidated group
  masterTFs = allTFs.filter((_, i) => tfGroups[i].group === 'master');
  consolidatedTFs = allTFs.filter((_, i) => tfGroups[i].group === 'consolidated');

  // Sort master TFs in user-defined order
  // Each entry: [keyword1, keyword2] — both must appear in label
  const MASTER_ORDER = [
    ['MONTHLY','R4'],
    ['DAILY','R4'],
    ['1 HOUR','R4'],
    ['15 MIN','R4'],
    ['MONTHLY','R2'],
    ['DAILY','R2'],
    ['MONTHLY','S4'],
  ];
  function tfOrderIndex(tf) {
    const up = tf.label.toUpperCase();
    return MASTER_ORDER.findIndex(([k1, k2]) => up.includes(k1) && up.includes(k2));
  }
  masterTFs.sort((a, b) => {
    const ai = tfOrderIndex(a); const bi = tfOrderIndex(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  console.log('Master:', masterTFs.map(t => t.label));
  console.log('Consolidated:', consolidatedTFs.map(t => t.label));
  consolidatedTFs.forEach(tf => {
    console.log(tf.label, '→', tf.cols.map((c,i) => CATS[i].label + ':' + c.length));
  });
  // Feature 5 — update tab badges after parse
  updateTabBadges();
}

function getTFColor(label) {
  const up = label.toUpperCase().trim();
  for (const [k, v] of Object.entries(TF_COLORS)) {
    if (up.includes(k.toUpperCase())) return v;
  }
  return '#64748b';
}

function isMasterTF(label) {
  const up = label.toUpperCase().trim();
  // Must NOT start with M-D-H / D-H / H-15 / D:R2
  if (isConsolidatedTF(label)) return false;
  return MASTER_TF_KEYWORDS.some(k => up.includes(k));
}
function isConsolidatedTF(label) {
  const up = label.toUpperCase().trim();
  return CONSOLIDATED_TF_STARTS.some(k => up.startsWith(k.toUpperCase()) || up.includes(k.toUpperCase()));
}

// Virtual scroll state
const VS = {
  ROW_H: 48,         // px — desktop row height
  OVERSCAN: 8,       // extra rows above/below viewport
  rows: [],          // all built row HTML strings
  viewport: null,    // DOM ref
  tbodyEl: null,
  theadEl: null,
  spacerTop: null,
  spacerBot: null,
  totalRows: 0,
  visStart: 0,
  visEnd: 0,
  ticking: false,
};

function buildTable(tfs, term) {
  if (!tfs.length) return '<div style="padding:60px;text-align:center;color:var(--muted)">No timeframes found</div>';

  if (activeMasterTF >= tfs.length) activeMasterTF = 0;
  const tf = tfs[activeMasterTF];

  const tfTabs = tfs.map((t, i) => `
    <button class="tf-pill ${i === activeMasterTF ? 'active' : ''}"
      style="border-color:${i === activeMasterTF ? t.color : 'var(--border)'};
             color:${i === activeMasterTF ? t.color : 'var(--muted)'};
             background:${i === activeMasterTF ? t.color+'18' : 'transparent'}"
      onclick="activeMasterTF=${i};render()">
      ${t.label}
    </button>`).join('');

  let maxRows = 0;
  tf.cols.forEach(col => { if (col.length > maxRows) maxRows = col.length; });

  const hdr = CATS.map(cat =>
    `<th class="cat-head" style="color:${cat.color}">${cat.label}</th>`
  ).join('');

  // Pre-build ALL row strings into VS.rows[]
  VS.rows = [];
  for (let r = 0; r < maxRows; r++) {
    let rowMatch = false;
    let cells = '';
    CATS.forEach((cat, ci) => {
      const stock = tf.cols[ci][r] || '';
      if (stock) {
        const match = term && stock.toLowerCase().includes(term);
        if (match) rowMatch = true;
        const label = match
          ? stock.replace(new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'), 'gi'), m => `<mark>${m}</mark>`)
          : stock;
        cells += `<td><span class="sp ${cat.cls}${match?' hl':''}">${label}</span></td>`;
      } else {
        cells += `<td></td>`;
      }
    });
    if (term && !rowMatch) continue;
    VS.rows.push(`<tr><td class="rn">${VS.rows.length + 1}</td>${cells}</tr>`);
  }

  VS.totalRows = VS.rows.length;
  VS.ROW_H = document.body.classList.contains('mobile-view') ? 54 : 48;

  const swipeDots = tfs.map((t, i) => `<span class="swipe-dot${i === activeMasterTF ? ' active' : ''}" style="${i === activeMasterTF ? 'background:'+t.color : ''}"></span>`).join('');

  const emptyMsg = VS.totalRows === 0
    ? `<tr><td class="rn">—</td><td colspan="7" style="text-align:center;padding:30px;color:var(--muted)">No stocks found for "<strong>${term}</strong>"</td></tr>`
    : '';

  return `
    <div class="tf-pill-bar">${tfTabs}</div>
    <div class="swipe-hint">
      <span style="opacity:0.6">⟵ swipe</span>
      <div class="swipe-hint-dots">${swipeDots}</div>
      <span style="opacity:0.6">swipe ⟶</span>
    </div>
    <div class="legend">
      <span style="color:var(--muted);margin-right:4px">Categories:</span>
      ${CATS.map(c=>`<span class="leg-item"><span class="leg-dot" style="background:${c.color}"></span>${c.label}</span>`).join('')}
      <span style="color:var(--muted);font-size:0.7rem;margin-left:10px">${VS.totalRows} rows</span>
    </div>
    <div class="vs-viewport" id="masterWrap">
      <div class="master-wrap">
        <table id="vsTable">
          <thead id="vsHead">
            <tr>
              <th class="rn grp-head" style="position:sticky;top:0;z-index:20">#</th>
              <th class="grp-head" colspan="7" style="color:${tf.color};border-top:3px solid ${tf.color};position:sticky;top:0;z-index:20">${tf.label}</th>
            </tr>
            <tr>
              <th class="rn" style="position:sticky;top:42px;z-index:19"></th>
              ${hdr}
            </tr>
          </thead>
          <tbody id="vsTbody">
            <tr class="vs-spacer-top" id="vsSpacerTop" style="height:0"><td colspan="8"></td></tr>
            ${emptyMsg}
            <tr class="vs-spacer-bot" id="vsSpacerBot" style="height:0"><td colspan="8"></td></tr>
          </tbody>
        </table>
      </div>
    </div>`;
}

function render() {
  const term = searchTerm.toLowerCase();
  const mc = document.getElementById('mainContent');

  if (activeTab === 'master') {
    mc.innerHTML = buildTable(masterTFs, term);
    // Boot virtual scroll after DOM is ready
    requestAnimationFrame(() => initVirtualScroll());
  } else {
    mc.innerHTML = buildConsolidated(term);
    // Attach click via event delegation — avoids JSON-in-onclick-attribute issues
    mc.addEventListener('click', e => {
      const cell = e.target.closest('.clickable-cell');
      if (!cell) return;
      const key = cell.dataset.storeKey;
      const entry = window._conClickStore && window._conClickStore[key];
      if (entry) openModal(entry.tfLabel, entry.catLabel, entry.stocks);
    });
  }

  document.querySelectorAll('.stab').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === activeTab);
  });

  // Feature 5 — update badges
  updateTabBadges();
}

function buildConsolidated(term) {
  if (!consolidatedTFs.length) return '<div style="padding:60px;text-align:center;color:var(--muted)">No consolidated timeframes found</div>';

  // Safe click store — avoids JSON-in-HTML-attribute quoting issues
  window._conClickStore = {};
  let storeIdx = 0;

  function registerClick(tfLabel, catLabel, stocks) {
    const key = 'c' + (storeIdx++);
    window._conClickStore[key] = { tfLabel, catLabel, stocks };
    return key;
  }

  // Header cells: one per timeframe
  const tfHeaderCells = consolidatedTFs.map((tf, tfi) => {
    const totalStocks = tf.cols.reduce((a, c) => a + c.length, 0);
    const isLast = tfi === consolidatedTFs.length - 1;
    return `<th class="tf-col-hd${isLast ? '' : ' tf-sep'}" style="color:${tf.color};border-top:3px solid ${tf.color}">
      ${tf.label}
      <span style="font-size:0.65rem;font-family:Calibri,sans-serif;font-weight:400;opacity:0.7;margin-left:8px">${totalStocks} stocks</span>
    </th>`;
  }).join('');

  // Body rows: one per category
  const bodyRows = CATS.map((cat, ci) => {
    const isCollapsed = collapsedCats.has(cat.key);
    const cells = consolidatedTFs.map((tf, tfi) => {
      let stocks = tf.cols[ci] || [];
      if (term) stocks = stocks.filter(s => s.toLowerCase().includes(term));
      const isLast = tfi === consolidatedTFs.length - 1;

      if (!stocks.length) {
        return `<td class="con-cell${isLast ? '' : ' tf-sep'}" style="text-align:center">
          <span class="empty-cell">—</span>
        </td>`;
      }

      const cellKey = registerClick(tf.label, cat.label, stocks);

      const pills = stocks.map(s => {
        const lbl = term
          ? s.replace(new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`)
          : s;
        return `<span class="pill-xs"
          style="color:${cat.color};border-color:${cat.color}33;background:${cat.color}0f"
          title="${s} · ${cat.label} · ${tf.label}">${lbl}</span>`;
      }).join('');

      return `<td class="con-cell${isLast ? '' : ' tf-sep'} clickable-cell"
        data-store-key="${cellKey}"
        title="Click to open ${cat.label} · ${tf.label}">
        <div class="pill-wrap">${pills}</div>
      </td>`;
    }).join('');

    return `<tr data-cat-key="${cat.key}" class="${isCollapsed ? 'cat-collapsed' : ''}">
      <td class="row-lbl cat-row-toggle" onclick="toggleCatCollapse('${cat.key}')" title="Toggle ${cat.label}">
        <span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${cat.color};margin-right:7px;vertical-align:middle;flex-shrink:0"></span>${cat.label}
        <span class="cat-toggle-arrow" style="float:right;font-size:0.65rem;color:${cat.color};margin-top:1px">${isCollapsed ? '▶' : '▼'}</span>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <button class="col-collapse-all" onclick="toggleCollapseAll()">
        ${collapsedCats.size > 0 ? '⊞ Expand All' : '⊟ Collapse All'}
      </button>
    </div>
    <div class="con-tbl-wrap">
      <table class="con-tbl">
        <thead>
          <tr>
            <th class="row-lbl-hd" style="top:0;z-index:23">Category</th>
            ${tfHeaderCells}
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

// PE color: <15 green (undervalued), 15-25 yellow (fair), 25-40 orange, >40 red (expensive)
function peColor(pe) {
  if (pe == null) return '#6a7d96';
  if (pe < 15)  return '#00e5a0';
  if (pe < 25)  return '#fbbf24';
  if (pe < 40)  return '#fb923c';
  return '#fb7185';
}
// EPS color: positive = purple, negative = red
function epsColor(eps) {
  if (eps == null) return '#6a7d96';
  return eps >= 0 ? '#a78bfa' : '#fb7185';
}

// ROE color: >15% green, 10-15% yellow, <10% red
function roeColor(roe) {
  if (roe == null) return '#6a7d96';
  const pct = roe * 100;
  if (pct >= 15) return '#34d399';
  if (pct >= 10) return '#fbbf24';
  return '#fb7185';
}

// D/E color: <0.5 blue (low debt), 0.5-1 yellow, >1 red (high debt)
function deColor(de) {
  if (de == null) return '#6a7d96';
  if (de < 0.5) return '#38bdf8';
  if (de < 1.0) return '#fbbf24';
  return '#fb7185';
}

function renderModalRows(priceData) {
  Object.keys(priceData).forEach(symbol => {
    const q = priceData[symbol];
    if (!q || !q.price) return;

    const open      = q.open      || q.price;
    const prevClose = q.prevClose || q.open || q.price;
    const chg    = chgMode === 'open'
                   ? (q.chgFromOpen  != null ? q.chgFromOpen  : q.price - open)
                   : (q.chgFromClose != null ? q.chgFromClose : q.price - prevClose);
    const chgPct = chgMode === 'open'
                   ? (q.chgPctFromOpen  != null ? q.chgPctFromOpen  : (open > 0 ? (q.price - open) / open * 100 : 0))
                   : (q.chgPctFromClose != null ? q.chgPctFromClose : (prevClose > 0 ? (q.price - prevClose) / prevClose * 100 : 0));

    const isUp  = chg >= 0;
    const chgColor = isUp ? '#00e5a0' : '#fb7185';
    const arrow = isUp ? '▲' : '▼';

    // Day high/low: high = green, low = red
    // 52W: compare price to 52w high/low — near high = green tint, near low = red tint
    const dayHighColor  = '#00e5a0';
    const dayLowColor   = '#fb7185';
    const w52HighColor  = '#00e5a0';
    const w52LowColor   = '#fb7185';

    // ── PRICE ROW ──
    const isLight = document.body.classList.contains('light-theme');
    const ltpColor   = isLight ? '#0d1117'  : '#ffffff';
    const openColor  = isLight ? '#4a6080'  : '#8dafc8';
    const priceRow = document.getElementById('row-' + symbol);
    if (priceRow) {
      priceRow.innerHTML = `
        <td class="col-sym sym-cell">
          <span class="sym-name">${symbol}</span>
          <a href="https://www.nseindia.com/get-quotes/equity?symbol=${symbol}" target="_blank" class="sym-link">NSE ↗</a>
        </td>
        <td style="text-align:right;font-weight:800;color:${ltpColor};font-size:1.18rem">₹${fmt(q.price)}</td>
        <td style="text-align:right;font-weight:700;color:${chgColor};font-size:1.06rem">${arrow} ${fmt(Math.abs(chg))}</td>
        <td style="text-align:right;font-weight:800;color:${chgColor};font-size:1.12rem">${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</td>
        <td style="text-align:right;color:${openColor};font-weight:500;font-size:1rem">₹${fmt(open)}</td>
        <td style="text-align:right;color:${openColor};font-weight:500;font-size:1rem">₹${fmt(prevClose)}</td>
        <td style="text-align:right;font-weight:700;color:${dayHighColor};font-size:1rem">₹${fmt(q.high)}</td>
        <td style="text-align:right;font-weight:700;color:${dayLowColor};font-size:1rem">₹${fmt(q.low)}</td>
        <td style="text-align:right;font-weight:700;color:${w52HighColor};font-size:1rem">₹${fmt(q.high52)}</td>
        <td style="text-align:right;font-weight:700;color:${w52LowColor};font-size:1rem">₹${fmt(q.low52)}</td>`;
    }

    // ── FUNDAMENTALS CARD ──
    const fcard = document.getElementById('fcard-' + symbol);
    if (fcard) {
      const pc   = peColor(q.pe);
      const ec   = epsColor(q.eps);
      const roeC = roeColor(q.roe);
      const roceC= roeColor(q.roce);
      const deC  = deColor(q.debtToEquity);
      const npmC = q.netProfitMargin != null
        ? (q.netProfitMargin >= 0.15 ? '#a78bfa' : q.netProfitMargin >= 0.10 ? '#fbbf24' : '#fb7185')
        : null;
      const betaC = q.beta != null ? (q.beta < 0.8 ? '#38bdf8' : q.beta < 1.2 ? '#fbbf24' : '#fb7185') : null;

      const v = (val, color, format) => val != null
        ? `<span class="fund-metric-value" style="color:${color}">${format(val)}</span>`
        : `<span class="fund-metric-value dim">—</span>`;

      // ── FEATURE 1: Health Score (0–10) ──
      let healthScore = 0, healthCount = 0;
      // PE: <15→2, 15-25→1.5, 25-40→0.5, >40→0
      if (q.pe != null) { healthScore += q.pe < 15 ? 2 : q.pe < 25 ? 1.5 : q.pe < 40 ? 0.5 : 0; healthCount++; }
      // ROE: ≥20%→2, ≥15%→1.5, ≥10%→0.8, <10%→0
      if (q.roe != null) { const r=q.roe*100; healthScore += r>=20?2:r>=15?1.5:r>=10?0.8:0; healthCount++; }
      // D/E: <0.3→2, <0.5→1.5, <1→0.8, ≥1→0
      if (q.debtToEquity != null) { const d=q.debtToEquity; healthScore += d<0.3?2:d<0.5?1.5:d<1?0.8:0; healthCount++; }
      // NPM: ≥20%→2, ≥15%→1.5, ≥10%→0.8, <10%→0
      if (q.netProfitMargin != null) { const n=q.netProfitMargin*100; healthScore += n>=20?2:n>=15?1.5:n>=10?0.8:0; healthCount++; }
      // ROE bonus for high quality
      if (q.roce != null) { const rc=q.roce*100; healthScore += rc>=20?2:rc>=15?1.2:rc>=10?0.5:0; healthCount++; }
      // Normalise to 0–10
      const maxPossible = healthCount > 0 ? healthCount * 2 : 1;
      const health10 = healthCount > 0 ? Math.round((healthScore / maxPossible) * 10 * 10) / 10 : null;
      const healthColor = health10 == null ? '#6a7d96'
        : health10 >= 7.5 ? '#00e5a0' : health10 >= 5 ? '#fbbf24' : health10 >= 3 ? '#fb923c' : '#fb7185';
      const healthLabel = health10 == null ? 'N/A'
        : health10 >= 7.5 ? 'STRONG' : health10 >= 5 ? 'FAIR' : health10 >= 3 ? 'WEAK' : 'POOR';
      const healthBadgeHtml = health10 != null
        ? `<span class="health-badge" style="color:${healthColor};border-color:${healthColor}44;background:${healthColor}12">

           </span>`
        : '';

      // 52W range bar position
      const lo52 = q.low52 || 0, hi52 = q.high52 || 0;
      const pct52 = (hi52 > lo52 && q.price) ? Math.min(100, Math.max(0, ((q.price - lo52) / (hi52 - lo52)) * 100)) : 0;
      const barColor = pct52 > 70 ? '#00e5a0' : pct52 > 40 ? '#fbbf24' : '#fb7185';

      // ── FEATURE 7: Undervalued detection ──
      const isUndervalued = q.pe != null && q.roe != null && q.pe < 20 && (q.roe * 100) > 15;
      if (isUndervalued) fcard.classList.add('undervalued');
      else fcard.classList.remove('undervalued');

      // ── FEATURE 3: Stagger animation — set delay by card position ──
      const cards = document.querySelectorAll('#fund-grid .fund-card');
      const cardIdx = Array.from(cards).indexOf(fcard);
      fcard.classList.add('animate-in');
      fcard.style.animationDelay = (cardIdx * 55) + 'ms';

      // ── Sort data attributes (Feature 2) ──
      fcard.dataset.health = health10 != null ? health10 : -1;
      fcard.dataset.pe     = q.pe != null ? q.pe : 9999;
      fcard.dataset.roe    = q.roe != null ? q.roe : -1;
      fcard.dataset.roce   = q.roce != null ? q.roce : -1;
      fcard.dataset.de     = q.debtToEquity != null ? q.debtToEquity : 9999;
      fcard.dataset.cap    = q.marketCap != null ? q.marketCap : -1;

      fcard.innerHTML = `
        <div class="fund-card-hd">
          <div class="fund-card-sym-wrap">
            <span class="fund-card-sym">${symbol}</span>
            ${isUndervalued ? '<span class="undervalued-tag">★ Value</span>' : ''}
            <a href="https://www.nseindia.com/get-quotes/equity?symbol=${symbol}" target="_blank" class="fund-card-sym-link">NSE ↗</a>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">

            <div class="fund-card-price">₹${fmt(q.price)}<small>LTP</small></div>
          </div>
        </div>

        <div class="fund-52w-bar-wrap">
          <div class="fund-52w-labels">
            <span style="color:#fb7185">₹${fmt(lo52)}</span>
            <span style="color:#8a9ab0;font-size:0.6rem;font-family:Oxanium,sans-serif;font-weight:600;letter-spacing:0.08em">52W RANGE · ${pct52.toFixed(0)}%</span>
            <span style="color:#00e5a0">₹${fmt(hi52)}</span>
          </div>
          <div class="fund-52w-track">
            <div class="fund-52w-fill" style="width:${pct52}%;background:${barColor}"></div>
            <div class="fund-52w-thumb" style="left:${pct52}%;border-color:${barColor}"></div>
          </div>
        </div>

        <div class="fund-metrics-body">
          <div class="fund-metric-row">
            <div class="fund-metric">
              <span class="fund-metric-label" style="color:#fbbf24">PE</span>
              ${v(q.pe, pc, x => Number(x).toFixed(1))}
            </div>
            <div class="fund-metric">
              <span class="fund-metric-label" style="color:#a78bfa">EPS</span>
              ${v(q.eps, ec, x => '₹'+Number(x).toFixed(1))}
            </div>
          </div>
          <div class="fund-metric-row">
            <div class="fund-metric">
              <span class="fund-metric-label" style="color:#34d399">ROE</span>
              ${v(q.roe, roeC, x => (x*100).toFixed(1)+'%')}
            </div>
            <div class="fund-metric">

          </div>
          <div class="fund-metric-row">
            <div class="fund-metric">
              <span class="fund-metric-label" style="color:#fb7185">D/E</span>

// Check if NSE market is open (Mon-Fri, 9:15am - 3:30pm IST)
function marketStatus() {
  const now = new Date();
  const ist = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Kolkata' }));
  const day = ist.getDay(); // 0=Sun, 6=Sat
  const h = ist.getHours(), m = ist.getMinutes();
  const mins = h * 60 + m;
  if (day === 0 || day === 6) return { open: false, reason: 'Weekend — showing last traded prices' };
  if (mins < 9 * 60 + 15) return { open: false, reason: 'Pre-market — showing previous close' };
  if (mins > 15 * 60 + 30) return { open: false, reason: 'Market closed — showing last traded prices' };
  return { open: true, reason: 'Market open · Live prices' };
}

function fmt(n) {
  if (n == null || isNaN(n)) return '—';
  return Number(n).toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtX(n) {
  if (n == null || isNaN(n) || n === 0) return '<span style="color:var(--border2)">—</span>';
  return Number(n).toFixed(2);
}
function fmtCap(n) {
  if (n == null || isNaN(n)) return '<span style="color:var(--border2)">—</span>';
  const sign = n < 0 ? '−' : '';
  const abs  = Math.abs(n);
  if (abs === 0) return '<span style="color:var(--border2)">—</span>';
  if (abs >= 1e12) return sign + (abs/1e12).toFixed(2) + 'T';
  if (abs >= 1e9)  return sign + (abs/1e9).toFixed(2) + 'B';
  if (abs >= 1e7)  return sign + (abs/1e7).toFixed(2) + 'Cr';
  return sign + (abs/1e5).toFixed(2) + 'L';
}

// FEATURE 2 — Sort fund cards
// ═══════════════════════════════════════════════════════════
let fundSortMode = 'none';
let fundSortDir  = {};  // key → 'asc'|'desc'

function sortFundCards(mode, btn) {
  const grid = document.getElementById('fund-grid');
  if (!grid) return;

  // Update button states
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (mode === 'none') {
    // Restore DOM order (original order by data-original-index)
    const cards = [...grid.querySelectorAll('.fund-card')];
    cards.sort((a, b) => parseInt(a.dataset.origIdx||0) - parseInt(b.dataset.origIdx||0));
    cards.forEach(c => grid.appendChild(c));
    return;
  }

  // Toggle direction
  fundSortDir[mode] = fundSortDir[mode] === 'desc' ? 'asc' : 'desc';
  const dir = fundSortDir[mode];
  btn.querySelector('.sort-arrow').textContent = dir === 'desc' ? '↓' : '↑';

  const cards = [...grid.querySelectorAll('.fund-card')];
  cards.sort((a, b) => {
    const av = parseFloat(a.dataset[mode] ?? (mode==='de'||mode==='pe'?9999:-1));
    const bv = parseFloat(b.dataset[mode] ?? (mode==='de'||mode==='pe'?9999:-1));
    // For PE and D/E: lower is better → ascending default; for others: higher is better → descending default
    return dir === 'desc' ? bv - av : av - bv;
  });
  cards.forEach((c, i) => { c.style.animationDelay = (i * 40) + 'ms'; grid.appendChild(c); });
}

let kbToastTimer = null;
function showKbToast(msg) {
  const el = document.getElementById('kb-toast');
  if (!el) return;
  el.innerHTML = msg;
  el.classList.add('show');
  clearTimeout(kbToastTimer);
  kbToastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

document.addEventListener('keydown', e => {
  // Don't fire when typing in search
  if (e.target.tagName === 'INPUT') return;

  if (e.key === 'Escape') {
    const modal = document.getElementById('tv-modal');
    if (modal) { modal.remove(); showKbToast('<strong>ESC</strong> — Modal closed'); }
    return;
  }
  if (e.key === 'm' || e.key === 'M') {
    activeTab = 'master'; render();
    showKbToast('<strong>M</strong> — Master tab');
    return;
  }
  if (e.key === 'c' || e.key === 'C') {
    activeTab = 'consolidated'; render();
    showKbToast('<strong>C</strong> — Consolidated tab');
    return;
  }
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && activeTab === 'master' && masterTFs.length) {
    if (e.key === 'ArrowLeft')  activeMasterTF = (activeMasterTF - 1 + masterTFs.length) % masterTFs.length;
    if (e.key === 'ArrowRight') activeMasterTF = (activeMasterTF + 1) % masterTFs.length;
    render();
    showKbToast(`<strong>${e.key === 'ArrowLeft' ? '←' : '→'}</strong> — ${masterTFs[activeMasterTF].label}`);
    return;
  }
  if (e.key === '/' || e.key === 'f') {
    e.preventDefault();
    document.getElementById('gSearch').focus();
    showKbToast('<strong>/</strong> — Search');
  }
});

// Called after price data loads — tints rows based on 52W position
function apply52WTints(priceData) {
  if (activeTab !== 'master') return;
  const tbody = document.querySelector('.master-wrap tbody');
  if (!tbody) return;
  tbody.querySelectorAll('tr').forEach(row => {
    row.classList.remove('w52-high', 'w52-low');
    // Find stock symbols in this row
    row.querySelectorAll('.sp').forEach(pill => {
      const sym = pill.textContent.trim().toUpperCase();
      const q = priceData[sym];
      if (!q || !q.price || !q.high52 || !q.low52) return;
      const range = q.high52 - q.low52;
      if (range <= 0) return;
      const pct = (q.price - q.low52) / range;
      if (pct >= 0.8)      row.classList.add('w52-high');
      else if (pct <= 0.2) row.classList.add('w52-low');
    });
  });
}
